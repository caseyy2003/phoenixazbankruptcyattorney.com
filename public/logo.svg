<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">Yontz Law, PLLC Logo</title>
  <desc id="desc">A clean text logo reading Yontz Law, PLLC.</desc>

  <rect width="720" height="180" fill="white"/>

  <g fill="#111827" text-anchor="middle">
    <text
      x="360"
      y="88"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="58"
      font-weight="700"
      letter-spacing="1.5">
      Yontz Law
    </text>

    <line
      x1="198"
      y1="112"
      x2="522"
      y2="112"
      stroke="#9A6A2F"
      stroke-width="3"
      stroke-linecap="round"
    />

    <text
      x="360"
      y="145"
      font-family="Arial, Helvetica, sans-serif"
      font-size="24"
      font-weight="500"
      letter-spacing="4">
      PLLC
    </text>
  </g>
</svg>
